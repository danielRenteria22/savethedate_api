name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  STACK_NAME: SavethedateApiStack

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CDK app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::622615144484:role/gh-actions-deploy
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-savethedate-api

      - name: Deploy stack
        run: npx --yes aws-cdk@2.1126.0 deploy $STACK_NAME --require-approval never